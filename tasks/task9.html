<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="task5.css">
</head>
<body>
    <div class="container">

    <div class="left">
        <h1>
            Welcome to the <br>
            <span>Frontend Quiz!</span>
        </h1>
        <p><i>Pick a subject to get started.</i></p>
    </div>

    <div class="right">

        <div class="card">
    <div class="icon html"><i class="fa-brands fa-html5"></i></div>
    <span>HTML</span>
</div>

<div class="card">
    <div class="icon css"><i class="fa-brands fa-css3-alt"></i></div>
    <span>CSS</span>
</div>

<div class="card">
    <div class="icon js"><i class="fa-brands fa-js"></i></div>
    <span>JavaScript</span>
</div>

<div class="card">
    <div class="icon acc"><i class="fa-solid fa-universal-access"></i></div>
    <span>Accessibility</span>
</div>

    </div>

</div>
<div class="toggle">
    <i class="fa-solid fa-sun"></i>
    <label class="switch">
        <input type="checkbox" id="modeToggle">
        <span class="slider"></span>
    </label>
    <i class="fa-solid fa-moon"></i>
</div>
</body>
</html>
