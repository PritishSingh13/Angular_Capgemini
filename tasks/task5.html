<!DOCTYPE html>
<html lang="en">
<head>
    <title>Blog Card</title>

    <style>
        body {
            background: #f4d04e;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 320px;
            background: white;
            border-radius: 15px;
            box-shadow: 8px 8px 0px black;
            overflow: hidden;
            border: 1px solid black;
        }

        .card img {
            width: 100%;
            height: 200px;        
            object-fit: cover;    
            border-radius: 15px 15px 0 0;
        }

        .card-content {
            padding: 15px;
        }

        .tag {
            background: #f4d04e;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        .date {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
        }

        .author-name {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card">

        <!-- Local Image -->
        <img src="card.jpg" alt="card image">

        <div class="card-content">

            <div class="tag">Learning</div>

            <div class="date">Published 21 Dec 2023</div>

            <div class="title">HTML & CSS foundations</div>

            <div class="desc">
                These languages are the backbone of every website, defining structure, content, and presentation.
            </div>

            <div class="author">
                <img src="author.jpg" alt="author">
                <div class="author-name">Pritish Singh</div>
            </div>

        </div>

    </div>

</body>
</html>
