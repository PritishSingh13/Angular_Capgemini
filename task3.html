<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Detail Form</title>
</head>
<body>
    <fieldset>
        <legend><b>Application Details</b></legend>

        <form>

            <!-- First Name -->
            <label>First Name:</label>
            <input type="text" name="firstName" required 
                   pattern="[A-Za-z]{2,}" 
                   title="Only letters, minimum 2 characters">
            <br><br>

            <!-- Last Name -->
            <label>Last Name:</label>
            <input type="text" name="lastName" required 
                   pattern="[A-Za-z]{2,}" 
                   title="Only letters, minimum 2 characters">
            <br><br>

            <!-- Email -->
            <label>Email:</label>
            <input type="email" name="email" required>
            <br><br>

            <!-- Gender -->
            <label>Gender:</label><br>
            <input type="radio" name="gender" value="male" required> Male <br>
            <input type="radio" name="gender" value="female"> Female <br>
            <input type="radio" name="gender" value="other"> Other
            <br><br>

            <!-- Contact -->
            <label>Contact:</label>
            <input type="tel" name="contact" required 
                   pattern="[0-9]{10}" 
                   title="Enter 10 digit number">
            <br><br>

            <!-- Qualification -->
            <label>Qualification:</label>
            <input type="file" name="qualification" required>
            <br><br>

            <!-- Date -->
            <label>Joining Date:</label>
            <input type="date" name="joiningDate" required>
            <br><br>

            <!-- Skills -->
            <label>Skills:</label><br>
            <input type="checkbox" name="skills" value="JavaScript"> JavaScript
            <input type="checkbox" name="skills" value="Java"> Java <br>
            <input type="checkbox" name="skills" value="React"> React
            <input type="checkbox" name="skills" value="Express"> Express <br>
            <input type="checkbox" name="skills" value="Python"> Python
            <input type="checkbox" name="skills" value="SQL"> SQL
            <br><br>

            <!-- Experience -->
            <label>Years of Experience:</label>
            <input type="range" min="0" max="10" value="0">
            <br><br>

            <!-- Location -->
            <label for="WorkLocation">Work Location:</label>
            <select id="WorkLocation" name="WorkLocation" required>
                <option value="">-- Select --</option>

                <optgroup label="North India">
                    <option value="Gurgaon">Gurgaon</option>
                    <option value="Noida">Noida</option>
                    <option value="NewDelhi">New Delhi</option>
                </optgroup>

                <optgroup label="South India">
                    <option value="Hyderabad">Hyderabad</option>
                    <option value="Bengaluru">Bengaluru</option>
                </optgroup>
            </select>
            <br><br>

            <!-- Address -->
            <label>Address:</label>
            <textarea name="address" required minlength="10"></textarea>
            <br><br>

            <!-- Buttons -->
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>

        </form>
    </fieldset>
</body>
</html>
